name: Deploy Fermento Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar Deploy via SSH no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /var/www/fermento-site
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart fermento-site || pm2 start npm --name "fermento-site" -- run start -- -p 3001
            pm2 save
            nginx -t
            systemctl reload nginx
